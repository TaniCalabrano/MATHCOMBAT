<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0f0f1a; color: #e8e8f0; min-height: 100vh; }
.screen { display: none; max-width: 720px; margin: auto; padding: 2rem 1rem; }
.screen.active { display: block; }

/* HOME */
.home-title { font-size: 36px; font-weight: 700; text-align: center; margin-bottom: 4px; color: #fff; letter-spacing: 2px; }
.home-title span { color: #7c6af7; }
.home-sub { font-size: 14px; color: #888; text-align: center; margin-bottom: 2rem; }
.card { background: #1a1a2e; border: 1px solid #2a2a45; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; margin-top: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
input, select { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #2a2a45; border-radius: 8px; background: #0f0f1a; color: #e8e8f0; outline: none; }
input:focus, select:focus { border-color: #7c6af7; }
.btn { display: block; width: 100%; padding: 12px; font-size: 15px; font-weight: 600; border: 1px solid #2a2a45; border-radius: 8px; background: #1a1a2e; color: #e8e8f0; cursor: pointer; margin-top: 1rem; transition: all 0.15s; letter-spacing: 0.5px; }
.btn:hover { background: #2a2a45; }
.btn-primary { background: #7c6af7; color: #fff; border-color: #7c6af7; }
.btn-primary:hover { background: #6a58e0; }
.btn-danger { color: #e74c3c; border-color: #4a2020; }
.divider { text-align: center; font-size: 12px; color: #444; margin: 1rem 0; }
.log  { font-size: 12px; color: #e74c3c; text-align: center; margin-top: 0.5rem; min-height: 16px; }
.info { font-size: 12px; color: #7c6af7; text-align: center; margin-top: 0.5rem; }
.room-code { font-size: 40px; font-weight: 700; letter-spacing: 10px; text-align: center; padding: 1rem; background: #0f0f1a; border-radius: 8px; margin: 1rem 0; color: #7c6af7; }
.waiting-msg { text-align: center; padding: 1.5rem 1rem; }
.waiting-msg .big { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.waiting-msg .small { font-size: 13px; color: #888; }
.dot-anim::after { content: '.'; animation: dots 1.5s infinite; }
@keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }

/* ARENA DE COMBATE */
.arena { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1rem; }
.fighter { background: #1a1a2e; border: 1px solid #2a2a45; border-radius: 14px; padding: 1rem; text-align: center; position: relative; transition: border-color 0.3s; }
.fighter.active-turn { border-color: #7c6af7; box-shadow: 0 0 16px rgba(124,106,247,0.3); }
.fighter.taking-hit { animation: hitFlash 0.4s ease; }
.fighter.attacking { animation: attackBob 0.4s ease; }
@keyframes hitFlash { 0%{background:#1a1a2e} 30%{background:#3a1a1a} 100%{background:#1a1a2e} }
@keyframes attackBob { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
.fighter-name { font-size: 13px; font-weight: 600; color: #e8e8f0; margin-bottom: 6px; }
.fighter-role { font-size: 10px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.avatar-wrap { width: 80px; height: 80px; margin: 0 auto 10px; }
.hp-bar-wrap { background: #0f0f1a; border-radius: 99px; height: 8px; margin-bottom: 4px; overflow: hidden; border: 1px solid #2a2a45; }
.hp-bar { height: 100%; border-radius: 99px; transition: width 0.6s ease, background 0.3s; }
.hp-text { font-size: 11px; color: #888; }
.dmg-popup { position: absolute; top: 10px; right: 10px; font-size: 18px; font-weight: 700; opacity: 0; pointer-events: none; }
.dmg-popup.show-dmg { animation: popDmg 1s ease forwards; }
.dmg-popup.show-heal { animation: popHeal 1s ease forwards; color: #2ecc71; }
@keyframes popDmg { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-30px)} }
@keyframes popHeal { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-30px)} }

/* TIMER */
.timer-wrap { background: #1a1a2e; border-radius: 99px; height: 6px; margin-bottom: 1rem; overflow: hidden; border: 1px solid #2a2a45; }
.timer-bar { height: 100%; border-radius: 99px; transition: width 1s linear, background 0.5s; background: #7c6af7; }

/* PREGUNTA */
.turn-box { text-align: center; font-size: 13px; color: #888; margin-bottom: 0.5rem; }
.turn-box span { font-weight: 700; color: #7c6af7; }
.progress { font-size: 11px; color: #555; text-align: center; margin-bottom: 0.75rem; }
.question-card { background: #1a1a2e; border: 1px solid #2a2a45; border-radius: 14px; padding: 1.5rem; margin-bottom: 0.75rem; }
.badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 6px; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-calc { background: #1a2a45; color: #7cb4f7; }
.badge-ode  { background: #2a1a45; color: #c47cf7; }
.q-text { font-size: 15px; line-height: 1.7; margin-bottom: 1.25rem; color: #e8e8f0; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.opt-btn { background: #0f0f1a; border: 1px solid #2a2a45; border-radius: 8px; padding: 0.75rem 1rem; font-size: 14px; color: #e8e8f0; cursor: pointer; text-align: left; transition: all 0.15s; }
.opt-btn:hover:not(:disabled) { background: #2a2a45; border-color: #7c6af7; }
.opt-btn.correct { background: #0f2a1a; border-color: #2ecc71; color: #2ecc71; }
.opt-btn.wrong   { background: #2a0f0f; border-color: #e74c3c; color: #e74c3c; }
.opt-btn:disabled { cursor: default; opacity: 0.7; }
.status { font-size: 13px; text-align: center; margin: 0.5rem 0; min-height: 20px; color: #888; }
.status.correct { color: #2ecc71; font-weight: 600; }
.status.wrong   { color: #e74c3c; font-weight: 600; }

/* RESULTADO */
.result-winner { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 4px; color: #7c6af7; }
.result-sub { font-size: 14px; color: #888; text-align: center; margin-bottom: 1.5rem; }
.result-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
.result-card { background: #0f0f1a; border: 1px solid #2a2a45; border-radius: 10px; padding: 1rem; text-align: center; }
.result-card .rname { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.result-card .rpts { font-size: 22px; font-weight: 700; color: #7c6af7; }

/* KaTeX fix para tema oscuro */
.katex { color: #e8e8f0 !important; }
</style>
</head>

  try {
    katex.render(tex, el, { throwOnError:false, displayMode:false });
  } catch(e){
    el.textContent = tex;
  }
}

function renderHP(idx, hp){
  const pct = Math.max(0,(hp/MAX_HP)*100);
  const bar = document.getElementById("hp-bar-p"+(idx+1));
  const txt = document.getElementById("hp-text-p"+(idx+1));
  bar.style.width = pct+"%";
  bar.style.background = pct>60?"#2ecc71":pct>30?"#f39c12":"#e74c3c";
  txt.textContent = Math.max(0,hp)+" / "+MAX_HP;
}

function showDamage(idx, amount, isHeal){
  const el = document.getElementById("dmg-p"+(idx+1));
  el.textContent = (isHeal?"+":"-")+Math.abs(amount);
  el.style.color = isHeal?"#2ecc71":"#e74c3c";
  el.classList.remove("show-dmg","show-heal");
  void el.offsetWidth;
  el.classList.add(isHeal?"show-heal":"show-dmg");
}

function animateFighter(idx, type){
  const el = document.getElementById("fighter-p"+(idx+1));
  el.classList.remove("taking-hit","attacking");
  void el.offsetWidth;
  el.classList.add(type);
  setTimeout(()=>el.classList.remove(type), 500);
}

// ---- Conectar botones ----
document.getElementById("btn-create").addEventListener("click", createRoom);
document.getElementById("btn-join").addEventListener("click", joinRoom);
document.getElementById("btn-start").addEventListener("click", hostStartGame);
document.getElementById("btn-cancel").addEventListener("click", leaveRoom);
document.getElementById("btn-leave-guest").addEventListener("click", leaveRoom);
document.getElementById("btn-home").addEventListener("click", goHome);

async function createRoom(){
  myName=document.getElementById("home-name").value.trim();
  myAvatar=document.getElementById("home-avatar").value;
  if(!myName){setLog("Escribe tu nombre primero");return;}
  myRole="host";
  roomCode=genCode();
  roomRef=ref(db,"rooms/"+roomCode);
  await set(roomRef,{
    host:myName, hostAvatar:myAvatar,
    guest:"", guestAvatar:"",
    status:"waiting",
    config:{numQ:10,timeLimit:30},
    game:null
  });
  document.getElementById("lobby-code").textContent=roomCode;
  showScreen("screen-lobby");

  guestUnsub=onValue(ref(db,"rooms/"+roomCode+"/guest"),snap=>{
    const g=snap.val();
    if(g){
      document.getElementById("lobby-status-title").textContent=g+" se unio!";
      document.getElementById("lobby-status-sub").textContent="Ya puedes iniciar el combate";
      document.getElementById("btn-start").style.display="block";
    } else {
      document.getElementById("lobby-status-title").innerHTML="Esperando oponente<span class='dot-anim'></span>";
      document.getElementById("lobby-status-sub").textContent="Nadie conectado aun";
      document.getElementById("btn-start").style.display="none";
    }
  });

  statusUnsub=onValue(ref(db,"rooms/"+roomCode+"/status"),snap=>{
    if(snap.val()==="playing") initGame();
  });
}

async function joinRoom(){
  myName=document.getElementById("home-name").value.trim();
  myAvatar=document.getElementById("home-avatar").value;
  const code=document.getElementById("join-code").value.trim().toUpperCase();
  if(!myName){setLog("Escribe tu nombre primero");return;}
  if(code.length!==4){setLog("El codigo debe tener 4 caracteres");return;}
  roomCode=code;
  roomRef=ref(db,"rooms/"+roomCode);
  const snap=await get(roomRef);
  if(!snap.exists()){setLog("Sala no encontrada");return;}
  const data=snap.val();
  if(data.status==="playing"){setLog("La sala ya esta en juego");return;}
  if(data.guest&&data.guest!==""){setLog("La sala ya tiene dos jugadores");return;}
  myRole="guest";
  await update(roomRef,{guest:myName, guestAvatar:myAvatar});
  document.getElementById("guest-lobby-info").textContent="Sala: "+roomCode+" — vs "+data.host;
  showScreen("screen-guest-lobby");

  statusUnsub=onValue(ref(db,"rooms/"+roomCode+"/status"),snap=>{
    if(snap.val()==="playing") initGame();
  });
}

async function hostStartGame(){
  const numQ=parseInt(document.getElementById("lobby-numq").value);
  const timeLimit=parseInt(document.getElementById("lobby-time").value);
  const qList=shuffle(QUESTIONS).slice(0,numQ);
  await update(roomRef,{
    status:"playing",
    config:{numQ,timeLimit},
    game:{
      qList:qList, qIdx:0, turn:0,
      scores:[0,0], hp:[MAX_HP,MAX_HP],
      phase:"question", ts:Date.now()
    }
  });
}

async function initGame(){
  if(gameUnsub) gameUnsub();
  const snap=await get(ref(db,"rooms/"+roomCode));
  const data=snap.val();
  if(!data) return;
  currentConfig=data.config;
  currentNames.host=data.host;
  currentNames.guest=data.guest;
  currentAvatars.host=data.hostAvatar||"warrior";
  currentAvatars.guest=data.guestAvatar||"robot";

  // Renderizar avatares
  document.getElementById("fname-p1").textContent=data.host;
  document.getElementById("frole-p1").textContent=AVATAR_NAMES[currentAvatars.host]||"";
  document.getElementById("avatar-p1").innerHTML=AVATARS[currentAvatars.host]||AVATARS.warrior;
  document.getElementById("fname-p2").textContent=data.guest;
  document.getElementById("frole-p2").textContent=AVATAR_NAMES[currentAvatars.guest]||"";
  document.getElementById("avatar-p2").innerHTML=AVATARS[currentAvatars.guest]||AVATARS.robot;
  renderHP(0, MAX_HP);
  renderHP(1, MAX_HP);

  lastQIdx=-1;
  showScreen("screen-game");

  gameUnsub=onValue(ref(db,"rooms/"+roomCode+"/game"),snap=>{
    const g=snap.val();
    if(!g) return;
    // Actualizar HP siempre
    if(g.hp){
      renderHP(0, g.hp[0]);
      renderHP(1, g.hp[1]);
    }
    if(g.phase==="finished"){showResult(g);return;}
    if(g.phase==="question"&&g.qIdx!==lastQIdx){
      lastQIdx=g.qIdx;
      renderQuestion(g);
    }
  });
}

function renderQuestion(g){
  clearInterval(timerInterval);
  answered=false;
  const q=g.qList[g.qIdx];
  const names=[currentNames.host,currentNames.guest];
  const isMyTurn=(myRole==="host"&&g.turn===0)||(myRole==="guest"&&g.turn===1);

  document.getElementById("turn-name").textContent=names[g.turn];
  document.getElementById("fighter-p1").classList.toggle("active-turn", g.turn===0);
  document.getElementById("fighter-p2").classList.toggle("active-turn", g.turn===1);
  document.getElementById("progress-txt").textContent="Pregunta "+(g.qIdx+1)+" de "+g.qList.length;
  document.getElementById("q-badge").innerHTML='<span class="badge badge-'+(q.topic==="Calculo"?"calc":"ode")+'">'+q.topic+'</span>';

  // Renderizar pregunta con KaTeX
  const qEl = document.getElementById("q-text");
  qEl.innerHTML="";
  renderKatex(qEl, q.q);

  document.getElementById("status-msg").textContent="";
  document.getElementById("status-msg").className="status";
  document.getElementById("game-info").textContent=isMyTurn?"Es tu turno — ataca!":"Esperando al oponente...";

  const opts=document.getElementById("options");
  opts.innerHTML="";
  q.opts.forEach((o,i)=>{
    const btn=document.createElement("button");
    btn.className="opt-btn";
    // Renderizar opciones con KaTeX
    const span=document.createElement("span");
    try { katex.render(o, span, {throwOnError:false, displayMode:false}); }
    catch(e){ span.textContent=o; }
    btn.appendChild(span);
    btn.disabled=!isMyTurn;
    if(isMyTurn) btn.addEventListener("click",()=>submitAnswer(i,g));
    opts.appendChild(btn);
  });

  if(isMyTurn){
    timeLeft=currentConfig.timeLimit;
    updateBar(currentConfig.timeLimit);
    timerInterval=setInterval(()=>{
      timeLeft--;
      updateBar(currentConfig.timeLimit);
      if(timeLeft<=0){clearInterval(timerInterval);if(!answered)submitAnswer(-1,g);}
    },1000);
  } else {
    document.getElementById("timer-bar").style.width="100%";
    document.getElementById("timer-bar").style.background="#7c6af7";
  }
}

async function submitAnswer(idx,g){
  if(answered)return;
  answered=true;
  clearInterval(timerInterval);

  const q=g.qList[g.qIdx];
  const correct=idx===q.ans;
  const attacker=g.turn;        // quien responde
  const defender=g.turn===0?1:0; // quien recibe daño si correcto

  const btns=document.querySelectorAll(".opt-btn");
  btns.forEach(b=>b.disabled=true);
  if(idx>=0)btns[idx].classList.add(correct?"correct":"wrong");
  btns[q.ans].classList.add("correct");

  const status=document.getElementById("status-msg");
  const newHP=[...g.hp];
  const newScores=[g.scores[0],g.scores[1]];

  if(correct){
    // Ataque al oponente
    newHP[defender]=Math.max(0, newHP[defender]-DMG_CORRECT);
    newScores[attacker]++;
    animateFighter(attacker,"attacking");
    setTimeout(()=>animateFighter(defender,"taking-hit"),300);
    showDamage(defender, DMG_CORRECT, false);
    status.textContent="Correcto! Atacas al oponente (-"+DMG_CORRECT+" HP)";
    status.className="status correct";
  } else {
    // Daño a uno mismo
    newHP[attacker]=Math.max(0, newHP[attacker]-DMG_WRONG);
    animateFighter(attacker,"taking-hit");
    showDamage(attacker, DMG_WRONG, false);
    if(idx===-1){
      status.textContent="Tiempo! Pierdes -"+DMG_WRONG+" HP";
    } else {
      status.textContent="Incorrecto! Pierdes -"+DMG_WRONG+" HP";
    }
    status.className="status wrong";
  }

  const nextIdx=g.qIdx+1;
  const someoneDown=newHP[0]<=0||newHP[1]<=0;
  const finished=nextIdx>=g.qList.length||someoneDown;

  setTimeout(async()=>{
    await update(ref(db,"rooms/"+roomCode+"/game"),{
      scores:newScores,
      hp:newHP,
      qIdx:nextIdx,
      turn:g.turn===0?1:0,
      phase:finished?"finished":"question",
      ts:Date.now()
    });
  },1800);
}

function updateBar(total){
  const pct=Math.max(0,(timeLeft/total)*100);
  const bar=document.getElementById("timer-bar");
  bar.style.width=pct+"%";
  bar.style.background=pct>50?"#7c6af7":pct>25?"#f39c12":"#e74c3c";
}

function showResult(g){
  clearInterval(timerInterval);
  if(gameUnsub){gameUnsub();gameUnsub=null;}
  showScreen("screen-result");

  const s0=g.scores[0],s1=g.scores[1];
  const hp0=Math.max(0,g.hp[0]), hp1=Math.max(0,g.hp[1]);
  let winner,sub,trophy="🏆";

  // Gana quien tenga mas HP, en empate quien tenga mas puntos
  if(hp0>hp1){winner="Gana "+currentNames.host+"!";sub="Con "+hp0+" HP restantes";}
  else if(hp1>hp0){winner="Gana "+currentNames.guest+"!";sub="Con "+hp1+" HP restantes";}
  else if(s0>s1){winner="Gana "+currentNames.host+"!";sub="Empate de HP — mas preguntas correctas";}
  else if(s1>s0){winner="Gana "+currentNames.guest+"!";sub="Empate de HP — mas preguntas correctas";}
  else{winner="Empate total!";sub="Guerreros de igual nivel";trophy="⚔️";}

  document.getElementById("res-trophy").textContent=trophy;
  document.getElementById("res-winner").textContent=winner;
  document.getElementById("res-sub").textContent=sub;
  document.getElementById("res-l1").textContent=currentNames.host;
  document.getElementById("res-l2").textContent=currentNames.guest;
  document.getElementById("res-avatar-p1").innerHTML=AVATARS[currentAvatars.host]||AVATARS.warrior;
  document.getElementById("res-avatar-p2").innerHTML=AVATARS[currentAvatars.guest]||AVATARS.robot;
  document.getElementById("res-p1").textContent=s0+" puntos";
  document.getElementById("res-p2").textContent=s1+" puntos";
  document.getElementById("res-hp1").textContent=hp0+" HP restantes";
  document.getElementById("res-hp2").textContent=hp1+" HP restantes";

  if(myRole==="host") setTimeout(()=>remove(roomRef),3000);
}

function leaveRoom(){
  clearInterval(timerInterval);
  if(gameUnsub){gameUnsub();gameUnsub=null;}
  if(statusUnsub){statusUnsub();statusUnsub=null;}
  if(guestUnsub){guestUnsub();guestUnsub=null;}
  if(roomRef){
    if(myRole==="host") remove(roomRef);
    else update(roomRef,{guest:"",guestAvatar:""});
  }
  roomRef=null; lastQIdx=-1;
  goHome();
}

function goHome(){
  lastQIdx=-1; answered=false;
  clearInterval(timerInterval);
  setLog("");
  document.getElementById("join-code").value="";
  showScreen("screen-home");
}
</script>
